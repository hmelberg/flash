<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>flash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>

<style>
:root {
  --bg: #eef1f4; --fg: #1d2530; --muted: #6e7887; --card: #ffffff;
  --border: #dbe1e8; --accent: #33689c; --ok: #2f7d4f; --danger: #b3402f;
  --warn: #a06a00; --btn: #e6eaef;
  --serif: "Source Serif 4", Georgia, "Times New Roman", serif;
  --shadow: 0 1px 2px rgba(29,37,48,.06), 0 6px 18px rgba(29,37,48,.07);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #14171c; --fg: #e6e6e2; --muted: #96a0ab; --card: #1d2229;
    --border: #2e353d; --accent: #6fa7d8; --ok: #5eb37f; --danger: #e0806e;
    --warn: #d9a441; --btn: #262c34;
    --shadow: 0 1px 2px rgba(0,0,0,.4), 0 6px 18px rgba(0,0,0,.35);
  }
}
* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--fg);
  font: 16px/1.5 system-ui, -apple-system, sans-serif; }
header { display: flex; gap: .9rem; align-items: baseline; padding: .65rem 1rem;
  flex-wrap: wrap; }
header .logo { font-weight: 700; letter-spacing: .02em; margin-right: .3rem; }
header a { color: var(--muted); text-decoration: none; font-size: .95rem;
  padding-bottom: 2px; border-bottom: 2px solid transparent; }
header a.active { color: var(--fg); border-bottom-color: var(--accent); }
header a:hover { color: var(--fg); }
main { max-width: 720px; margin: 0 auto; padding: .6rem 1rem 2rem; }
h1 { font-size: 1.25rem; } h2 { font-size: 1.05rem; margin-top: 1.6rem; }
button { font: inherit; border: 1px solid var(--border); background: var(--btn);
  color: var(--fg); border-radius: 9px; padding: .45rem .9rem; cursor: pointer; }
button:hover { border-color: var(--muted); }
button.primary { background: var(--accent); color: #fff; border-color: transparent; }
button.danger { color: var(--danger); }
button.linkish { border: none; background: none; color: var(--muted);
  text-decoration: underline; padding: .3rem .2rem; font-size: .88rem; }
.iconbtn { border: none; background: none; padding: .35rem .5rem; font-size: 1.15rem;
  line-height: 1; border-radius: 8px; }
.iconbtn:hover { background: var(--btn); border: none; }
input, select, textarea { font: inherit; background: var(--card); color: var(--fg);
  border: 1px solid var(--border); border-radius: 6px; padding: .35rem .5rem; width: 100%; }
label { display: block; margin: .7rem 0 .15rem; color: var(--muted); font-size: .9rem; }
.muted { color: var(--muted); } .small { font-size: .85rem; }
.hidden { display: none; }

/* Hjem: tema-fliser */
.deckgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: .8rem; margin: .8rem 0; }
.decktile { background: var(--card); border: 1px solid var(--border); border-radius: 14px;
  padding: 1rem 1.1rem; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: .55rem; }
.decktile h3 { margin: 0; font-family: var(--serif); font-size: 1.15rem; font-weight: 600; }
.pills { display: flex; gap: .45rem; flex-wrap: wrap; }
.pill { font-size: .82rem; padding: .12rem .55rem; border-radius: 99px;
  background: var(--btn); color: var(--muted); cursor: default; }
.pill.hot { background: color-mix(in srgb, var(--accent) 14%, var(--btn)); color: var(--fg); }
.tilebtns { display: flex; gap: .5rem; align-items: center; margin-top: auto; }
.addrow { display: flex; gap: .5rem; flex-wrap: wrap; align-items: center; }

/* Økt */
.smeta { display: flex; justify-content: space-between; align-items: center;
  gap: .6rem; color: var(--muted); font-size: .88rem; }
.smeta .deckname { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.smeta .right { display: flex; align-items: center; gap: .35rem; flex-shrink: 0; }
.pbar { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden;
  margin: .45rem 0 1rem; }
.pbar > div { height: 100%; background: var(--accent); transition: width .25s ease; }
.cardwrap { position: relative; margin: 0 0 1.1rem; }
.cardwrap::before, .cardwrap::after { content: ""; position: absolute; inset: 0;
  background: var(--card); border: 1px solid var(--border); border-radius: 16px; z-index: 0; }
.cardwrap::before { transform: translateY(10px) scale(.955); opacity: .5; }
.cardwrap::after { transform: translateY(5px) scale(.978); opacity: .8; }
.card { position: relative; z-index: 1; background: var(--card);
  border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow);
  padding: 1.1rem 1.4rem 1.9rem; height: clamp(300px, 52vh, 440px); display: flex;
  flex-direction: column; text-align: center; cursor: pointer; }
.qzone { flex: 0 0 42%; display: flex; flex-direction: column;
  justify-content: center; overflow-y: auto; }
.azone { flex: 1; overflow-y: auto; border-top: 1px solid var(--border);
  display: flex; flex-direction: column; justify-content: flex-start; }
.azone .answer { padding-top: 1.1rem; }
.corner { position: absolute; right: .6rem; bottom: .45rem; display: flex;
  gap: .1rem; opacity: .4; transition: opacity .15s; }
.corner:hover, .corner:focus-within { opacity: 1; }
.corner .iconbtn { font-size: .95rem; padding: .25rem .4rem; }
.mdbox { text-align: left; font-size: .97rem; line-height: 1.55; white-space: normal; }
.mdbox p { margin: .5rem 0; }
.mdbox table { border-collapse: collapse; margin: .5rem 0; }
.mdbox td, .mdbox th { border: 1px solid var(--border); padding: .2rem .5rem; }
.card .side { font-family: var(--serif); font-size: 1.55rem; line-height: 1.35; overflow-x: auto; }
.card .side table { margin: .5rem auto; border-collapse: collapse; font-size: 1.05rem; }
.card .side td, .card .side th { border: 1px solid var(--border); padding: .25rem .6rem; }
.card img { max-width: 100%; max-height: 220px; border-radius: 8px; margin: .5rem auto; }
.card .answer { animation: reveal .22s ease-out; }
.card .example { margin-top: 1rem; padding-top: .8rem; border-top: 1px dashed var(--border);
  font-family: var(--serif); font-size: 1.05rem; color: var(--muted); }
.card .divider { border-top: 1px solid var(--border); margin: 1.1rem 0; }
.ghost { margin: auto; border: 1px dashed var(--border); background: none;
  color: var(--muted); font-size: .85rem; padding: .3rem .9rem; border-radius: 99px; }
@keyframes reveal { from { opacity: 0; transform: translateY(7px); } }
@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
}
.gradebar { display: flex; gap: .7rem; justify-content: center; margin: .2rem 0 .5rem; }
.gradebar button { min-width: 8.5rem; padding: .8rem .8rem; font-size: 1.02rem;
  border-radius: 12px; }
.gradebar .fail { border-color: color-mix(in srgb, var(--danger) 55%, var(--border));
  color: var(--danger); background: var(--card); }
.gradebar .ok { background: var(--ok); color: #fff; border-color: transparent; }
.toolrow { display: flex; gap: .3rem; justify-content: center; flex-wrap: wrap; }
.badge { font-size: .72rem; padding: .1rem .45rem; border-radius: 99px;
  border: 1px solid var(--border); color: var(--muted); vertical-align: middle; cursor: default; }
.badge.new { color: var(--ok); border-color: var(--ok); }
.badge.leech { color: var(--danger); border-color: var(--danger); }
.banner { border: 1px solid var(--warn); border-radius: 10px; padding: .7rem .9rem;
  margin: .8rem 0; background: color-mix(in srgb, var(--warn) 8%, var(--card)); }
.progressline { color: var(--muted); font-size: .9rem; text-align: center; }
kbd { border: 1px solid var(--border); border-radius: 4px; padding: 0 .3rem; font-size: .85em; }

/* Bla / statistikk */
.lesson { margin: 1rem 0; }
.lesson h3 { margin: .3rem 0; font-size: 1rem; }
.cardlist { width: 100%; border-collapse: collapse; font-size: .92rem; }
.cardlist td { border-bottom: 1px solid var(--border); padding: .35rem .4rem; vertical-align: top; }
.bars { display: flex; gap: 3px; align-items: flex-end; height: 70px; margin: .5rem 0; }
.bars .bar { width: 22px; background: var(--accent); border-radius: 3px 3px 0 0; min-height: 2px; }
.bars .bar span { display: block; transform: translateY(-1.3rem); font-size: .7rem; text-align: center; color: var(--muted); }
dialog { background: var(--card); color: var(--fg); border: 1px solid var(--border);
  border-radius: 12px; max-width: 640px; width: 92vw; }
dialog::backdrop { background: rgba(0,0,0,.45); }
.ai-out { white-space: pre-wrap; font-size: .98rem; text-align: left; background: var(--bg);
  border: 1px solid var(--border); border-radius: 8px; padding: .7rem .9rem; margin-top: .8rem; }
</style>
</head>
<body>
<header>
  <span class="logo">⚡ flash</span>
  <a href="#home" data-nav="home">Home</a>
  <a href="#browse" data-nav="browse">Browse</a>
  <a href="#explore" data-nav="explore">Explore</a>
  <a href="#stats" data-nav="stats">Stats</a>
  <a href="#settings" data-nav="settings">Settings</a>
</header>
<main id="app"></main>

<script type="module">
import { newCardState, schedule, isLeech, isMature, DAY } from "./srs.js";
import { buildSession, unlockedLessons, allRefs, progressKey } from "./queue.js";
import { githubStore, driveStore, githubUser, ensureGithubRepo } from "./stores.js";
import { SYNCED_SETTINGS, mergeProgress, mergeSettings, parseShareHash } from "./sync.js";
import { aiMessage as aiCall, aiError } from "./ai.js";

/* ========== lagring ========== */
const KEY = "flash:v1";
const DEFAULTS = {
  progress: {},
  settings: { newPerDay: 10, autoRead: false, readQuestion: false, readExample: false,
    flowMode: "free", unlocked: [], skipped: [],
    model: "claude-opus-4-8", apiKey: "", aiProvider: "anthropic", aiBaseUrl: "",
    ghRepo: "", ghPat: "", autoSync: true },
  auth: null,          // {provider, token, refreshToken?, expiresAt?, user:{name,avatar}, repo?}
  decksCache: {},
  meta: { newUsedByDay: {}, notes: {}, lastSync: 0, settingsUpdatedAt: 0 },
};
const store = (() => {
  let data;
  try { data = JSON.parse(localStorage.getItem(KEY)) || structuredClone(DEFAULTS); }
  catch { data = structuredClone(DEFAULTS); }
  for (const k of Object.keys(DEFAULTS)) data[k] ??= structuredClone(DEFAULTS[k]);
  for (const k of Object.keys(DEFAULTS.settings)) data.settings[k] ??= DEFAULTS.settings[k];
  const save = () => localStorage.setItem(KEY, JSON.stringify(data));
  return { get: () => data, patch(fn) { fn(data); save(); } };
})();
const todayKey = (t = Date.now()) => new Date(t).toISOString().slice(0, 10);
const newUsedToday = () => store.get().meta.newUsedByDay[todayKey()] || 0;

/* ========== deck-innlasting ========== */
const BUILTIN = ["russian", "probability"];

function validateDeck(d) {
  const fail = (msg) => { throw new Error(`Invalid deck: ${msg}`); };
  if (!d || typeof d !== "object") fail("not a JSON object");
  if (!d.id) fail("missing 'id'");
  if (!d.title) fail("missing 'title'");
  if (!Array.isArray(d.lessons) || !d.lessons.length) fail("missing 'lessons'");
  const seen = new Set();
  d.lessons.forEach((l, li) => {
    if (!l.id) fail(`lesson ${li + 1} is missing 'id'`);
    if (!Array.isArray(l.cards)) fail(`lesson '${l.id}' is missing 'cards'`);
    if (l.intro != null && typeof l.intro !== "string") fail(`lesson '${l.id}': 'intro' must be a string`);
    l.cards.forEach((c, ci) => {
      if (!c.id) fail(`lesson '${l.id}', card ${ci + 1}: missing 'id'`);
      if (seen.has(c.id)) fail(`duplicate card id '${c.id}'`);
      seen.add(c.id);
      if (c.front == null || c.back == null) fail(`card '${c.id}': missing front/back`);
    });
  });
  return d;
}
function cacheDeck(deck) { store.patch(s => { s.decksCache[deck.id] = deck; }); }
function decks() { return Object.values(store.get().decksCache); }

async function loadBuiltins() {
  for (const name of BUILTIN) {
    try {
      const r = await fetch(`decks/${name}.json`, { cache: "no-cache" });
      if (r.ok) cacheDeck(validateDeck(await r.json()));
    } catch { /* file:// eller offline — cache/filvelger gjelder */ }
  }
}
async function loadDeckFromUrl(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const deck = validateDeck(await r.json());
  cacheDeck(deck); return deck;
}
async function loadDeckFromFile(file) {
  const deck = validateDeck(JSON.parse(await file.text()));
  cacheDeck(deck); return deck;
}

// Delingslenker: #deck=<uri-enkodet URL> → forhåndsvisning, import ved bekreftelse.
async function handleShareHash() {
  const url = parseShareHash(location.hash);
  if (!url) return;
  location.hash = "#home";
  let deck;
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    deck = validateDeck(await r.json());
  } catch (e) { alert("Could not fetch the shared deck: " + e.message); return; }
  const nCards = deck.lessons.reduce((n, l) => n + l.cards.length, 0);
  const finnes = !!store.get().decksCache[deck.id];
  const dlg = openDialog(`<div style="padding:1.2rem">
    <h2 style="margin-top:0">📬 Shared deck</h2>
    <p><strong>${esc(deck.title)}</strong> — ${deck.lessons.length} lessons, ${nCards} cards.</p>
    ${finnes ? `<p class="small" style="color:var(--danger)">You already have a deck with id "${esc(deck.id)}" — it will be replaced (your progress is kept).</p>` : ""}
    <div style="display:flex;gap:.6rem;justify-content:flex-end;margin-top:.8rem">
      <button onclick="this.closest('dialog').close()">Cancel</button>
      <button class="primary" id="share-add">Add deck</button></div></div>`);
  $("#share-add", dlg).onclick = () => { cacheDeck(deck); dlg.close(); render(); };
}

// Del et eget tema: hemmelig gist (GitHub) eller offentlig Drive-fil (Google).
async function shareDeck(id) {
  const deck = store.get().decksCache[id];
  const a = store.get().auth;
  if (!deck) return;
  if (!a) { alert("Sign in with GitHub or Google (Settings) to share."); return; }
  try {
    let rawUrl;
    const content = JSON.stringify(deck, null, 1);
    if (a.provider === "github") {
      const r = await fetch("https://api.github.com/gists", {
        method: "POST",
        headers: { Authorization: `Bearer ${a.token}`, Accept: "application/vnd.github+json" },
        body: JSON.stringify({ public: false, description: `flash-tema: ${deck.title}`,
          files: { [`${deck.id}.json`]: { content } } }),
      });
      if (!r.ok) throw new Error(`GitHub gist: HTTP ${r.status}`);
      rawUrl = (await r.json()).files[`${deck.id}.json`].raw_url;
    } else {
      const token = await googleAccessToken();
      const boundary = "flashshare";
      const body = `--${boundary}\r\ncontent-type: application/json; charset=UTF-8\r\n\r\n` +
        JSON.stringify({ name: `flash-shared-${deck.id}.json` }) +
        `\r\n--${boundary}\r\ncontent-type: application/json\r\n\r\n${content}\r\n--${boundary}--`;
      const cr = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id", {
        method: "POST",
        headers: { Authorization: `Bearer ${token}`, "content-type": `multipart/related; boundary=${boundary}` },
        body,
      });
      if (!cr.ok) throw new Error(`Drive: HTTP ${cr.status}`);
      const fid = (await cr.json()).id;
      const pr = await fetch(`https://www.googleapis.com/drive/v3/files/${fid}/permissions`, {
        method: "POST",
        headers: { Authorization: `Bearer ${token}`, "content-type": "application/json" },
        body: JSON.stringify({ role: "reader", type: "anyone" }),
      });
      if (!pr.ok) throw new Error(`Drive sharing: HTTP ${pr.status}`);
      const cfg = await authConfig();
      if (!cfg?.google_api_key) throw new Error("The server is missing GOOGLE_API_KEY — cannot create a public link.");
      rawUrl = `https://www.googleapis.com/drive/v3/files/${fid}?alt=media&key=${cfg.google_api_key}`;
    }
    const link = `${APP_URL()}#deck=${encodeURIComponent(rawUrl)}`;
    await navigator.clipboard.writeText(link);
    alert("Share link copied to the clipboard:\n\n" + link);
  } catch (e) { alert("Sharing failed: " + e.message); }
}

/* ========== hjelpere ========== */
const $ = (sel, el = document) => el.querySelector(sel);
const esc = (s) => String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

function contentHtml(v) {
  if (v && typeof v === "object" && v.html) return v.html; // rå HTML — bevisst tillatt (egne decks)
  return esc(v);
}
function typeset(el) {
  if (window.renderMathInElement) {
    window.renderMathInElement(el, {
      delimiters: [
        { left: "$$", right: "$$", display: true },
        { left: "$", right: "$", display: false },
        { left: "\\(", right: "\\)", display: false },
        { left: "\\[", right: "\\]", display: true },
      ],
      throwOnError: false,
    });
  }
}
/* Tale: spørsmål og svar på hver sin side sitt språk, med to ulike stemmer.
   Nettleseren oppgir ikke kjønn på stemmene — vi gjetter via navn på vanlige
   systemstemmer; treffer vi ikke, velges uansett to forskjellige stemmer. */
let voicesCache = [];
if ("speechSynthesis" in window) {
  const load = () => { voicesCache = speechSynthesis.getVoices(); };
  load();
  speechSynthesis.onvoiceschanged = load;
}
const VOICE_F = /female|kvinne|milena|samantha|victoria|karen|moira|tessa|alice|anna|ellen|kyoko|yuna|luciana|monica|paulina|satu|alva|nora|ida|zuzana|carmit|melina|laura|amelie|audrey|chantal|joana|kanya|lekha|mariska/i;
const VOICE_M = /\bmale\b|\bman\b|yuri|daniel|\balex\b|fred|thomas|diego|jorge|juan|luca|magnus|henrik|oskar|xander|rishi|aaron|arthur|gordon|martin|eddy|reed|rocko/i;
function pickVoice(lang, gender) {
  const pfx = (lang === "no" ? "nb" : lang).toLowerCase();
  const match = voicesCache.filter(v => v.lang.toLowerCase().startsWith(pfx) ||
    (lang === "no" && v.lang.toLowerCase().startsWith("no")));
  if (!match.length) return null;
  const re = gender === "f" ? VOICE_F : VOICE_M;
  return match.find(v => re.test(v.name)) || match[gender === "f" ? 0 : match.length - 1];
}
function speakText(text, lang, gender) {
  if (!text) return;
  const u = new SpeechSynthesisUtterance(text.replace(/́/g, "")); // fjern trykk-aksenter
  u.lang = lang;
  const v = pickVoice(lang, gender);
  if (v) u.voice = v;
  speechSynthesis.speak(u);
}
const plainTxt = (v) => (typeof v === "string" ? v : "");

// Spørsmålet: det som vises på forsiden, i den sidens språk. Mannsstemme.
function speakQuestion(deck, ref) {
  if (!("speechSynthesis" in window)) return;
  const card = ref.card;
  const showsFront = !ref.rev;
  const lang = showsFront ? (deck.language?.front || "en") : (deck.language?.back || "en");
  const text = showsFront ? (card.tts || plainTxt(card.front)) : plainTxt(card.back);
  speechSynthesis.cancel();
  speakText(text, lang, "m");
}

// Svaret: kvinnestemme. Uten spørsmålsopplesing prioriteres målspråket (tts),
// som før; med spørsmålsopplesing leses svarsiden på sitt eget språk.
function speakAnswer(deck, ref) {
  if (!("speechSynthesis" in window)) return;
  const card = ref.card;
  const s = store.get().settings;
  const frontLang = deck.language?.front || "en";
  let text, lang;
  if (ref.rev || !s.readQuestion) {
    text = card.tts || plainTxt(card.front); lang = frontLang;
  } else {
    text = plainTxt(card.back); lang = deck.language?.back || frontLang;
    if (!text) { text = card.tts || plainTxt(card.front); lang = frontLang; }
  }
  speechSynthesis.cancel();
  speakText(text, lang, "f");
  if (s.readExample && card.example?.text) speakText(card.example.text, frontLang, "f");
}
function deckCounts(deck) {
  const { progress, settings } = store.get();
  const s = buildSession({ deck, progress, settings, now: Date.now(), newLimitUsedToday: newUsedToday() });
  return s.counts;
}
function findCard(deck, cardId) {
  for (const l of deck.lessons) for (const c of l.cards) if (c.id === cardId) return { lesson: l, card: c };
  return null;
}

/* ========== økt ========== */
let session = null; // {deck, queue, idx, flipped, shownAt, failCounts, undo, stats}

function startSession(deckId, includeNew, extraNew = false) {
  const deck = store.get().decksCache[deckId];
  const { progress, settings } = store.get();
  // extraNew: brukeren ber eksplisitt om en ny runde forbi dagsgrensen
  const built = buildSession({ deck, progress, settings, now: Date.now(),
    newLimitUsedToday: extraNew ? 0 : newUsedToday() });
  const queue = built.due.concat(includeNew ? built.newAvail : []);
  if (!queue.length) { alert("No cards to show right now."); return; }
  session = { deck, queue, idx: 0, flipped: false, shownAt: Date.now(),
    failCounts: {}, undo: null, leechRef: null,
    stats: { total: 0, ok: 0, fail: 0, newLearned: 0 } };
  location.hash = "#session";
}

// Øvingsmodus: alle kort i én leksjon, uavhengig av forfall. Kort som ikke er
// til forfall re-planlegges bare ved "fail" (tidlig OK gir ingen ny informasjon).
function startPractice(deckId, lessonId) {
  const deck = store.get().decksCache[deckId];
  const refs = allRefs(deck).filter(r => r.lessonId === lessonId);
  if (!refs.length) return;
  const now = Date.now();
  const prio = (r) => {
    const st = store.get().progress[progressKey(r.deckId, r.cardId, r.rev)];
    if (st && st.due > 0 && st.due <= now) return 0; // forfalt først
    if (!st || st.due === 0) return 1;                // så nye
    return 2;                                         // så resten
  };
  const queue = refs.slice().sort((a, b) => prio(a) - prio(b));
  session = { deck, queue, idx: 0, flipped: false, shownAt: Date.now(),
    failCounts: {}, undo: null, leechRef: null, practice: true,
    stats: { total: 0, ok: 0, fail: 0, newLearned: 0 } };
  location.hash = "#session";
}

function currentRef() { return session?.queue[session.idx] ?? null; }

function gradeCard(grade) {
  const ref = currentRef(); if (!ref || !session.flipped) return;
  const key = progressKey(ref.deckId, ref.cardId, ref.rev);
  const prevState = store.get().progress[key] || newCardState();
  const wasNew = prevState.due === 0;
  const ms = session.shownAt2 - session.shownAt; // tid til flip
  const next = schedule(prevState, grade, ms, Date.now());
  const requeued = grade === "fail" && (session.failCounts[key] || 0) < 2;
  // øvingsmodus: tidlig OK på et ikke-forfalt kort endrer ikke planen
  const earlyOk = session.practice && grade === "ok" && prevState.due > Date.now();

  session.undo = { key, prevState: structuredClone(prevState), idx: session.idx,
    requeued, wasNew, grade };
  if (!earlyOk) store.patch(s => {
    s.progress[key] = next;
    if (wasNew) s.meta.newUsedByDay[todayKey()] = (s.meta.newUsedByDay[todayKey()] || 0) + 1;
  });
  if (grade !== "never") { // «kan det»-parkering teller ikke som ok/fail
    session.stats.total++;
    session.stats[grade === "ok" ? "ok" : "fail"]++;
    if (wasNew && grade === "ok") session.stats.newLearned++;
  }

  if (requeued) {
    session.failCounts[key] = (session.failCounts[key] || 0) + 1;
    session.queue.splice(Math.min(session.idx + 4, session.queue.length), 0, ref);
  }
  session.leechRef = (grade === "fail" && isLeech(next)) ? ref : null;
  session.idx++;
  session.flipped = false;
  render();
}

function undoLast() {
  const u = session?.undo; if (!u) return;
  store.patch(s => {
    s.progress[u.key] = u.prevState;
    if (u.prevState.reps === 0 && u.prevState.due === 0) delete s.progress[u.key];
    if (u.wasNew) s.meta.newUsedByDay[todayKey()] = Math.max(0, (s.meta.newUsedByDay[todayKey()] || 1) - 1);
  });
  if (u.requeued) {
    // fjern re-innsatt kopi
    const pos = session.queue.findIndex((r, i) => i > u.idx && progressKey(r.deckId, r.cardId, r.rev) === u.key);
    if (pos > -1) session.queue.splice(pos, 1);
    session.failCounts[u.key] = Math.max(0, (session.failCounts[u.key] || 1) - 1);
  }
  if (u.grade !== "never") {
    session.stats.total--;
    session.stats[u.grade === "ok" ? "ok" : "fail"]--;
    if (u.wasNew && u.grade === "ok") session.stats.newLearned--;
  }
  session.idx = u.idx;
  session.flipped = false;
  session.undo = null;
  session.leechRef = null;
  render();
}

function flipCard() {
  if (!session || session.flipped) return;
  session.flipped = true;
  session.shownAt2 = Date.now();
  session.flipGuardUntil = Date.now() + 300; // hindrer at dobbelttrykk graderer ved uhell
  const ref = currentRef();
  if (store.get().settings.autoRead && session.deck.settings?.tts) speakAnswer(session.deck, ref);
  render();
}

function deckTile(d) {
    const c = deckCounts(d);
    const { progress, settings } = store.get();
    const unseen = allRefs(d).filter(r => {
      const st = progress[progressKey(r.deckId, r.cardId, r.rev)];

    }).length;
    const quotaBlocked = c.new === 0 && unseen > 0;
    return `<div class="decktile">
      <h3>${esc(d.title)}</h3>
      <div class="pills">
        <span class="pill ${c.due ? "hot" : ""}" title="cards due for review">🔁 ${c.due}</span>

          ? `daily limit of ${settings.newPerDay} new cards reached — ${unseen} unseen cards waiting`

{

function cardBadges(ref, state) {
  const b = [];
  if (!state || state.due === 0) b.push(`<span class="badge new" title="new card">new</span>`);
  if (ref.rev) b.push(`<span class="badge" title="reversed card: answer → question">⇄</span>`);
  if (state && isLeech(state)) b.push(`<span class="badge leech" title="fails often — consider rewriting it">leech</span>`);
  return b.join(" ");
}

  }

  const frontVal = ref.rev ? card.back : card.front;

  const leech = session.leechRef;

    </div>`;
  const backHtml = `<div class="azone">${session.flipped ? `<div class="answer">

      ${card.example ? `<div class="example">${esc(card.example.text)}${card.example.translation ? `<br><span class="small">${esc(card.example.translation)}</span>` : ""}</div>` : ""}
      ${noteFor(ref) ? `<div class="example">📝 ${esc(noteFor(ref))}</div>` : ""}</div>`
    : `<button class="ghost" id="flipbtn" title="space or →">show answer</button>`}</div>`;
  const cornerHtml = `<div class="corner">
      ${hasInfo ? `<button class="iconbtn" id="infobtn" title="More info">ℹ️</button>` : ""}
      ${session.deck.settings?.tts ? `<button class="iconbtn" id="speakbtn" title="Read aloud">🔊</button>` : ""}
      ${card.hint ? `<button class="iconbtn" id="hintbtn" title="Show hint">💡</button>` : ""}
      ${session.flipped ? `<button class="iconbtn" data-grade="never" title="Almost never repeat (0)">💤</button>` : ""}
    </div>`;

  app.innerHTML = `
    ${leech ? `<div class="banner">This card has failed many times (leech).
      <button data-leech="suspend">Suspend</button>
      <button data-leech="keep">Keep</button></div>` : ""}
    <div class="smeta">
      <span class="deckname">${esc(session.deck.title)}${session.practice ? ' <span class="badge" title="practice — cards that are not due are only rescheduled on fail">practice</span>' : ""}</span>
      <span class="right">${cardBadges(ref, state)}
        <span>${session.idx + 1} of ${session.queue.length}</span>
        <span class="iconbtn" style="cursor:help" title="space/→ = flip, then OK · ← or 1 = not OK · 3 = OK · 0 = almost never repeat · z = undo">⌨</span>
      </span>
    </div>
    <div class="pbar"><div style="width:${pct}%"></div></div>
    <div class="cardwrap"><div class="card" id="cardface">${frontHtml}${backHtml}${cornerHtml}</div></div>
    ${session.flipped ? `
      <div class="gradebar">
        <button class="fail" data-grade="fail" title="← or 1">✕ Not OK</button>
        ${(!state || state.due === 0) ? `<button data-grade="never" title="I already know this — park it (~6 months, then yearly)">💤 Know it</button>` : ""}
        <button class="ok" data-grade="ok" title="space, → or 3">✓ OK</button>
      </div>` : ""}`;

  typeset($("#cardface"));
  $("#cardface").onclick = flipCard;
  app.querySelectorAll("[data-grade]").forEach(b => b.onclick = (e) => { e.stopPropagation(); gradeCard(b.dataset.grade); });
  const hintbtn = $("#hintbtn");
  if (hintbtn) hintbtn.onclick = (e) => { e.stopPropagation();
    $("#hintbox").classList.remove("hidden"); $("#hintbox").textContent = card.hint; };
  const sp = $("#speakbtn"); if (sp) sp.onclick = (e) => { e.stopPropagation();
    (session.flipped ? speakAnswer : speakQuestion)(session.deck, ref); };
  const ib = $("#infobtn"); if (ib) ib.onclick = (e) => { e.stopPropagation(); infoModal(ref); };
  // les opp spørsmålet automatisk — én gang per kortvisning

      !session.flipped && session.qSpokenFor !== session.idx) {

    speakQuestion(session.deck, ref);
  }
  app.querySelectorAll("[data-leech]").forEach(b => b.onclick = () => {
    if (b.dataset.leech === "suspend") {
      const key = progressKey(leech.deckId, leech.cardId, leech.rev);
      store.patch(s => { s.progress[key].suspended = "never"; s.progress[key].due = Date.now() + 180 * DAY; });
    }
    session.leechRef = null; render();
  });
}

/* ========== bla ========== */
function stateLabel(st) {
  if (!st || st.due === 0) return "new";
  if (st.suspended) return "suspended";
  if (isLeech(st)) return "leech";
  return isMature(st) ? "mature" : "young";
}

function viewBrowse() {
  const deckId = decodeURIComponent(location.hash.split("/")[1] || "");

  if (!deck) {
    const rows = decks().map(d =>
      `<div class="deckrow"><a href="#browse/${encodeURIComponent(d.id)}"><strong>${esc(d.title)}</strong></a>
       <span class="counts">${d.lessons.reduce((n, l) => n + l.cards.length, 0)} cards · ${d.lessons.length} lessons
       ${d.own ? `· <span class="badge">own</span> <button class="small" data-share="${esc(d.id)}">🔗 share</button>` : ""}</span></div>`).join("");

  const { progress, settings } = store.get();

  const lessonsHtml = deck.lessons.map(l => {
    const refs = [];
    for (const c of l.cards) { refs.push({ c, rev: false }); if (c.reverse) refs.push({ c, rev: true }); }
    const learned = refs.filter(r => (progress[progressKey(deck.id, r.c.id, r.rev)]?.stability ?? 0) >= 7).length;
    const rows = refs.map(r => {
      const key = progressKey(deck.id, r.c.id, r.rev);
      const st = progress[key];

        <td><span class="badge ${label === "leech" ? "leech" : label === "new" ? "new" : ""}">${label}</span></td>

    }).join("");
    const allSuspended = refs.length > 0 && refs.every(r =>

    return `<div class="lesson"><h3>${open.has(l.id) ? "🔓" : "🔒"} ${esc(l.title)}

          ? `<button class="small" data-wakelesson="${esc(l.id)}" title="Bring the cards back into rotation">wake lesson</button>`
          : `<button class="small" data-know="${esc(l.id)}" title="Park all cards (~6 months, then a yearly check)">✔ know this</button>`}
        <button class="small" data-skip="${esc(l.id)}" title="No new cards from this lesson — reviews still shown">${isSkipped ? "⏭ skipped ✓" : "⏭ skip"}</button>
        ${l.intro ? `<button class="iconbtn" data-intro="${esc(l.id)}" title="Read the lesson intro">📖</button>` : ""}</h3>
      ${l.note ? `<p class="muted small">${esc(l.note)}</p>` : ""}

  app.querySelectorAll("[data-unlock]").forEach(b => b.onclick = () => {
    store.patch(s => { s.settings.unlocked.push(`${deck.id}/${b.dataset.unlock}`); }); render();
  });
  app.querySelectorAll("[data-wake]").forEach(b => b.onclick = () => {
    store.patch(s => { const st = s.progress[b.dataset.wake]; st.suspended = false; st.due = Date.now(); st.lapses = 0; });
    render();
  });
  app.querySelectorAll("[data-rewrite]").forEach(b => b.onclick = () => rewriteDialog(deck, b.dataset.rewrite));
  app.querySelectorAll("[data-intro]").forEach(b => b.onclick = () => {
    const body = app.querySelector(`[data-introbody="${CSS.escape(b.dataset.intro)}"]`);
    if (body.classList.contains("hidden") && !body.innerHTML)
      mdRender(body, deck.lessons.find(x => x.id === b.dataset.intro)?.intro || "");
    body.classList.toggle("hidden");
  });
  app.querySelectorAll("[data-know]").forEach(b => b.onclick = () => {
    const l = deck.lessons.find(x => x.id === b.dataset.know);
    const now = Date.now();
    store.patch(s => {
      for (const c of l.cards) for (const rev of c.reverse ? [false, true] : [false]) {
        const key = progressKey(deck.id, c.id, rev);
        const st = s.progress[key] || newCardState();
        st.suspended = "never"; st.due = now + 180 * DAY;
        s.progress[key] = st;
      }
    });
    render();
  });
  app.querySelectorAll("[data-wakelesson]").forEach(b => b.onclick = () => {
    const l = deck.lessons.find(x => x.id === b.dataset.wakelesson);
    store.patch(s => {
      for (const c of l.cards) for (const rev of c.reverse ? [false, true] : [false]) {
        const st = s.progress[progressKey(deck.id, c.id, rev)];
        if (st?.suspended) { st.suspended = false; st.due = Date.now(); st.lapses = 0; }
      }
    });
    render();
  });
  app.querySelectorAll("[data-skip]").forEach(b => b.onclick = () => {
    const key = `${deck.id}/${b.dataset.skip}`;
    store.patch(s => {
      const i = s.settings.skipped.indexOf(key);
      i >= 0 ? s.settings.skipped.splice(i, 1) : s.settings.skipped.push(key);
      s.meta.settingsUpdatedAt = Date.now();
    });
    render();

  const g = $("#genbtn"); if (g) g.onclick = () => generateDialog(deck.id);
  $("#rmdeck").onclick = () => {
    if (!confirm(`Remove "${deck.title}"? Your progress is kept.`)) return;
    store.patch(s => { delete s.decksCache[deck.id]; });
    location.hash = "#browse";
  };
}

/* ========== statistikk ========== */
function viewStats() {
  const { progress } = store.get();
  const now = Date.now();
  let nNew = 0, nYoung = 0, nMature = 0, mOk = 0, mTot = 0;
  const perDay = {};
  for (const st of Object.values(progress)) {
    if (st.due === 0) nNew++;
    else if (st.suspended) { /* teller ikke */ }
    else if (isMature(st)) nMature++;
    else nYoung++;
    for (const h of st.history) {
      if (h.grade === "never") continue;
      if (now - h.t <= 14 * DAY) perDay[todayKey(h.t)] = (perDay[todayKey(h.t)] || 0) + 1;
      if (now - h.t <= 30 * DAY && isMature(st)) { mTot++; if (h.grade === "ok") mOk++; }
    }
  }
  const retention = mTot ? Math.round(100 * mOk / mTot) : null;
  const retMsg = retention == null ? "too few mature reviews yet"
    : retention > 95 ? "very high — intervals may be too cautious"
    : retention < 80 ? "low — intervals may be too aggressive"
    : "in the healthy range (80–95 %)";
  const days = [...Array(14)].map((_, i) => todayKey(now - (13 - i) * DAY));
  const max = Math.max(1, ...days.map(d => perDay[d] || 0));
  const bars = days.map(d => {
    const v = perDay[d] || 0;
    return `<div class="bar" style="height:${Math.round(100 * v / max)}%" title="${d}: ${v}"><span>${v || ""}</span></div>`;
  }).join("");

  app.innerHTML = `<h1>Stats</h1>
    <p><strong>Retention (mature cards, 30 d):</strong> ${retention == null ? "–" : retention + " %"}
       <span class="muted small">— ${retMsg}</span></p>
    <p>${nNew} new · ${nYoung} young · ${nMature} mature</p>
    <h2>Reviews, last 14 days</h2>
    <div class="bars">${bars}</div>`;
}

/* ========== innlogging (OAuth via /api/auth) ========== */
const APP_URL = () => location.origin + location.pathname;
let authCfgCache;
async function authConfig() {
  if (authCfgCache !== undefined) return authCfgCache;
  try {
    const r = await fetch("/api/auth");
    authCfgCache = r.ok ? await r.json() : null;
  } catch { authCfgCache = null; } // statisk server uten funksjoner
  return authCfgCache;
}

async function startLogin(provider) {
  const cfg = await authConfig();
  if (!cfg) { alert("Sign-in is not available on this server."); return; }
  const state = provider + ":" + crypto.randomUUID();
  sessionStorage.setItem("flash:oauthstate", state);
  const ru = encodeURIComponent(APP_URL());
  location.href = provider === "github"
    ? `https://github.com/login/oauth/authorize?client_id=${cfg.github_client_id}&scope=${encodeURIComponent("repo gist")}&state=${state}&redirect_uri=${ru}`
    : `https://accounts.google.com/o/oauth2/v2/auth?client_id=${cfg.google_client_id}&response_type=code&access_type=offline&prompt=consent&scope=${encodeURIComponent("openid email profile https://www.googleapis.com/auth/drive.file")}&state=${state}&redirect_uri=${ru}`;
}

async function handleOAuthCallback() {
  const q = new URLSearchParams(location.search);
  const code = q.get("code"), state = q.get("state");
  if (!code || !state) return;
  history.replaceState(null, "", APP_URL() + location.hash); // fjern code fra URL-en
  const expected = sessionStorage.getItem("flash:oauthstate");
  sessionStorage.removeItem("flash:oauthstate");
  if (state !== expected) { alert("Sign-in aborted: state mismatch."); return; }
  const provider = state.split(":")[0];
  try {
    const r = await fetch("/api/auth", {
      method: "POST", headers: { "content-type": "application/json" },
      body: JSON.stringify({ provider, code, redirect_uri: APP_URL() }),
    });
    const t = await r.json();
    if (!r.ok) throw new Error(t.error || `HTTP ${r.status}`);
    if (provider === "github") {
      const u = await githubUser(t.access_token);
      const repo = await ensureGithubRepo(t.access_token, u.login);
      store.patch(s => { s.auth = { provider, token: t.access_token,
        user: { name: u.name || u.login, avatar: u.avatar_url || "" }, repo }; });
    } else {
      const ur = await fetch("https://www.googleapis.com/oauth2/v3/userinfo",
        { headers: { Authorization: `Bearer ${t.access_token}` } });
      const u = ur.ok ? await ur.json() : {};
      store.patch(s => { s.auth = { provider, token: t.access_token,
        refreshToken: t.refresh_token || "",
        expiresAt: Date.now() + (t.expires_in || 3600) * 1000,
        user: { name: u.name || u.email || "Google user", avatar: u.picture || "" } }; });
    }
    syncNow(null, true); // hent alt til den nye enheten med en gang
  } catch (e) { alert("Sign-in failed: " + e.message); }
}

/* ========== synk (adapterbasert) ========== */
// Gyldig Google-token: refresher via auth-funksjonen når det er utløpt.
async function googleAccessToken() {
  const a = store.get().auth;
  if (!a || a.provider !== "google") throw new Error("Not signed in with Google.");
  if (Date.now() < (a.expiresAt || 0) - 60000) return a.token;
  const r = await fetch("/api/auth", {
    method: "POST", headers: { "content-type": "application/json" },
    body: JSON.stringify({ provider: "google", refresh_token: a.refreshToken }),
  });
  if (!r.ok) {
    store.patch(s => { s.auth = null; });
    throw new Error("Your Google sign-in has expired — sign in again.");
  }
  const t = await r.json();
  store.patch(s => { s.auth.token = t.access_token; s.auth.expiresAt = Date.now() + (t.expires_in || 3600) * 1000; });
  return t.access_token;
}

function activeStore() {
  const { auth, settings } = store.get();
  if (auth?.provider === "github") return githubStore({ token: auth.token, repo: auth.repo });
  if (auth?.provider === "google") return driveStore({ getToken: googleAccessToken });
  if (settings.ghRepo && settings.ghPat) return githubStore({ token: settings.ghPat, repo: settings.ghRepo });
  return null;
}

async function syncNow(statusEl, silent = false) {
  const say = (m) => { if (statusEl) statusEl.textContent = m; };
  const st = activeStore();
  if (!st) { say("Sign in (or set a PAT under Advanced) to sync."); return; }
  try {
    say("Syncing …");
    // 1) fremgang — merge, skriv, prøv én gang til ved versjonskonflikt
    let attempt = 0;
    while (true) {
      const remote = await st.load("progress.json");
      const d = store.get();
      const merged = mergeProgress(
        { progress: d.progress, notes: d.meta.notes, newUsedByDay: d.meta.newUsedByDay },
        remote?.json || null);
      try { await st.save("progress.json", JSON.stringify(merged), remote?.version); }
      catch (e) { if (e.conflict && attempt++ < 1) continue; throw e; }
      store.patch(s => {
        s.progress = merged.progress;
        s.meta.notes = merged.notes;
        s.meta.newUsedByDay = merged.newUsedByDay;
      });
      break;
    }
    // 2) innstillinger — siste skriving vinner
    const remoteS = await st.load("settings.json");
    const d = store.get();
    const m = mergeSettings({ values: d.settings, updatedAt: d.meta.settingsUpdatedAt }, remoteS?.json || null);
    if (m.source === "remote") {
      store.patch(s => { Object.assign(s.settings, m.values); s.meta.settingsUpdatedAt = m.updatedAt; });
    } else if (!remoteS || JSON.stringify(remoteS.json.values) !== JSON.stringify(m.values)) {
      await st.save("settings.json", JSON.stringify({ updatedAt: m.updatedAt, values: m.values }), remoteS?.version);
    }
    // 3) egne tema: dytt lokale …
    for (const deck of decks()) {
      if (!deck.own) continue;
      const path = `decks/${deck.id}.json`;
      const remote = await st.load(path);
      await st.save(path, JSON.stringify(deck, null, 1), remote?.version);
    }
    // … og hent tema som bare finnes eksternt (ny enhet)
    for (const path of await st.list("decks/")) {
      const id = path.slice("decks/".length).replace(/\.json$/, "");
      if (store.get().decksCache[id]) continue;
      const remote = await st.load(path);
      if (remote) {
        try { const deck = validateDeck(remote.json); deck.own = true; cacheDeck(deck); }
        catch { /* ugyldig fil eksternt — hopp over */ }
      }
    }
    store.patch(s => { s.meta.lastSync = Date.now(); });
    say("Synced ✓");
  } catch (e) {
    say("Sync failed: " + e.message);
    if (!silent && !statusEl) alert("Sync failed: " + e.message);
  }
}
function maybeAutoSync() {
  const s = store.get().settings;
  if (s.autoSync && activeStore()) syncNow(null, true);
}

/* ========== KI-integrasjon (via ai.js) ========== */
function aiAvailable() { return !!store.get().settings.apiKey; }

// Tynn wrapper: kallstedene bruker Anthropic-formet body som før;
// leverandørvalget bor i innstillingene.
function aiMessage(body, opts = {}) {
  const { aiProvider, apiKey, aiBaseUrl } = store.get().settings;
  return aiCall({ aiProvider, apiKey, aiBaseUrl }, body, opts);
}

function openDialog(html) {
  const dlg = document.createElement("dialog");
  dlg.innerHTML = html;
  document.body.append(dlg);
  dlg.addEventListener("close", () => dlg.remove());
  dlg.showModal();
  return dlg;
}

/* --- mer info-modal --- */
function mdRender(el, text) {
  el.innerHTML = window.marked ? marked.parse(text) : esc(text);
  typeset(el);
}

function cardContext(deck, card) {
  return `Context: ${deck.explainContext || deck.title}\n` +
    `Card front: ${typeof card.front === "object" ? card.front.html : card.front}\n` +
    `Card back: ${typeof card.back === "object" ? card.back.html : card.back}\n` +
    (card.hint ? `Hint: ${card.hint}\n` : "") +
    (card.example ? `Example: ${card.example.text} (${card.example.translation || ""})\n` : "");
}

function infoModal(ref) {
  const { card } = ref;
  const deck = session.deck;
  const dlg = openDialog(`<div style="padding:1.1rem 1.3rem">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem">
      <strong>More info</strong>
      <button class="iconbtn" id="mi-close" title="Close (Esc)">✕</button></div>
    <div id="mi-body"></div>
    <p id="mi-actions" style="margin:.6rem 0 0"></p>
    ${aiAvailable() ? `<form id="mi-form" style="display:flex;gap:.5rem;margin-top:.6rem">
      <input id="mi-q" placeholder="Ask a follow-up question …" autocomplete="off">
      <button class="primary">Ask</button></form>` : ""}
  </div>`);
  $("#mi-close", dlg).onclick = () => dlg.close();
  const body = $("#mi-body", dlg);
  const actions = $("#mi-actions", dlg);

  if (card.info) {
    const d = document.createElement("div");
    d.className = "mdbox";
    mdRender(d, card.info);
    body.append(d);
  }

  if (!aiAvailable()) {
    if (!card.info) body.innerHTML = `<p class="muted small">No extra info on this card.</p>`;
    return;
  }

  const s = store.get().settings;
  const messages = [];
  let busy = false;

  async function ask(question, { saveable = false } = {}) {
    if (busy) return;
    busy = true;
    messages.push({ role: "user", content: question });
    const out = document.createElement("div");
    out.className = "ai-out";
    body.append(out);
    try {
      const resp = await aiMessage({
        model: s.model, max_tokens: 1500,
        system: "You are a concise, excellent tutor helping with flashcard study. Answer in the language the user writes in (default: the language of the card's back side). Use markdown; $...$ for math. Keep answers focused.\n\nThe flashcard in question:\n" + cardContext(deck, card),
        messages,
      }, { onText: (t) => { out.textContent += t; } });
      const text = resp.content.find(b => b.type === "text")?.text || out.textContent;
      messages.push({ role: "assistant", content: text });
      out.className = "ai-out mdbox";
      mdRender(out, text);
      if (resp.stop_reason === "refusal") out.append("[The model declined to answer.]");
      if (saveable) {
        actions.innerHTML = `<button class="linkish" id="mi-note">save as a note on the card</button>`;
        $("#mi-note", dlg).onclick = () => {
          const key = progressKey(ref.deckId, ref.cardId, ref.rev);
          store.patch(st => { st.meta.notes[key] = text; });
          actions.innerHTML = `<span class="muted small">saved ✓</span>`;
        };
      }
    } catch (e) {
      if (e.name !== "AbortError") out.textContent += "\n[Error: " + aiError(e) + "]";
    } finally { busy = false; }
  }

  if (card.info) {
    actions.innerHTML = `<button class="linkish" id="mi-explain">✨ ask AI to explain more</button>`;
    $("#mi-explain", dlg).onclick = () => { actions.innerHTML = ""; ask("Explain this card: why the answer is what it is, memory hooks, common confusions, one or two extra examples. Max ~250 words.", { saveable: true }); };
  } else {
    ask("Explain this card: why the answer is what it is, memory hooks, common confusions, one or two extra examples. Max ~250 words.", { saveable: true });
  }

  const form = $("#mi-form", dlg);
  if (form) form.onsubmit = (e) => {
    e.preventDefault();
    const q = $("#mi-q", dlg).value.trim();
    if (!q) return;
    $("#mi-q", dlg).value = "";
    ask(q);
  };
}

// Promptene bor i repoet (prompts/*.md, på engelsk) — kan også brukes manuelt
// i en hvilken som helst KI-chat. Fallback hvis filene ikke kan hentes.
const promptCache = {};
async function fetchPrompt(path, fallback) {
  if (promptCache[path] === undefined) {
    try {
      const r = await fetch(path, { cache: "no-cache" });
      promptCache[path] = r.ok ? await r.text() : "";
    } catch { promptCache[path] = ""; /* file:// eller offline */ }
  }
  return promptCache[path] || fallback;
}
// PDF-tekst: pdf.js lastes fra CDN først når en PDF velges
let pdfjsLib = null;
async function extractPdfText(file) {
  if (!pdfjsLib) {
    pdfjsLib = await import("https://cdn.jsdelivr.net/npm/pdfjs-dist@4.6.82/build/pdf.min.mjs");
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.6.82/build/pdf.worker.min.mjs";
  }
  const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(await file.arrayBuffer()) }).promise;
  const pages = [];
  for (let p = 1; p <= pdf.numPages; p++) {
    const tc = await (await pdf.getPage(p)).getTextContent();
    pages.push(tc.items.map(i => i.str).join(" "));
  }
  return pages.join("\n\n");
}

const GEN_FALLBACK = "You create high-quality flashcards as JSON {lessons:[{id,title,note,cards:[{id,front,back,hint,example,tts,reverse}]}]}. One atomic fact per card; cloze with ___ where helpful; $...$ for math; vocabulary cards get reverse=true, plain tts and a short example sentence with translation; about 100 cards in lessons of 8-14 unless told otherwise.";
const EXTRACT_FALLBACK = "A source document is provided: extract flashcards covering its most important content, importance-first, mirroring the document's structure as lessons. Do not invent facts not in the document. Default about 1 card per 100 words.";

function generateDialog(defaultDeckId) {
  const all = decks();
  const deckOpts = all.map(d =>
    `<option value="${esc(d.id)}" ${d.id === defaultDeckId ? "selected" : ""}>${esc(d.title)}</option>`).join("");
  const dlg = openDialog(`<form method="dialog" style="padding:1.2rem">
    <h2 style="margin-top:0">✨ Generate cards</h2>
    <label>What should the cards be about?</label><input id="g-topic" placeholder="e.g. Russian verbs of motion — or an angle on the document below">
    <label>Document (optional — cards are then extracted from the content)</label>
    <textarea id="g-doc" rows="4" placeholder="Paste text here …"></textarea>
    <div class="addrow"><button type="button" id="g-docfile" class="linkish">📄 load from file (.txt/.md/.pdf)</button>
      <span id="g-doccount" class="muted small"></span>
      <input type="file" id="g-docpick" accept=".txt,.md,.markdown,.pdf,text/plain,application/pdf" class="hidden"></div>
    <label>Count</label><input id="g-count" type="number" min="1" max="150" placeholder="about 100" style="max-width:6.5rem">
    <label>Level</label><input id="g-level" placeholder="e.g. beginner">
    <label>Extra instructions (optional)</label><textarea id="g-extra" rows="2"></textarea>
    <label>Add to deck</label>
    <select id="g-deck">${deckOpts}<option value="__new__">— new deck —</option></select>
    <div id="g-newdeck" class="hidden"><label>Name of new deck</label><input id="g-newtitle"></div>
    <label>Placement</label><select id="g-lesson"></select>
    <div id="g-preview" style="max-height:45vh;overflow-y:auto"></div>
    <p id="g-status" class="small muted"></p>
    <div style="display:flex;gap:.5rem;justify-content:flex-end;margin-top:.8rem">
      <button value="cancel" formnovalidate>Close</button>
      <button type="button" id="g-run" class="primary">Generate</button>
    </div></form>`);

  const lessonSel = $("#g-lesson", dlg);
  function fillLessons() {
    const id = $("#g-deck", dlg).value;
    $("#g-newdeck", dlg).classList.toggle("hidden", id !== "__new__");
    const deck = store.get().decksCache[id];
    lessonSel.innerHTML = `<option value="__auto__">— new lessons (AI structures them) —</option>` +
      (deck ? deck.lessons.map(l =>
        `<option value="${esc(l.id)}">add to: ${esc(l.title)}</option>`).join("") : "");
  }
  fillLessons();
  $("#g-deck", dlg).onchange = fillLessons;

  // dokumentfelt: fil-innlasting og forslag til antall (~1 kort per 100 ord)
  const docWords = () => {
    const t = $("#g-doc", dlg).value.trim();
    return t ? t.split(/\s+/).length : 0;
  };
  const suggestedCount = () => Math.min(150, Math.max(5, Math.round(docWords() / 100)));
  function updateDocInfo() {
    const w = docWords();
    $("#g-doccount", dlg).textContent = w ? `${w} words → suggest about ${suggestedCount()} cards` : "";
    $("#g-count", dlg).placeholder = w ? `about ${suggestedCount()}` : "about 100";
  }
  $("#g-doc", dlg).oninput = updateDocInfo;
  $("#g-docfile", dlg).onclick = () => $("#g-docpick", dlg).click();
  $("#g-docpick", dlg).onchange = async (e) => {
    const f = e.target.files[0];
    if (!f) return;
    try {
      if (f.type === "application/pdf" || /\.pdf$/i.test(f.name)) {
        $("#g-doccount", dlg).textContent = "Reading PDF …";
        $("#g-doc", dlg).value = await extractPdfText(f);
      } else {
        $("#g-doc", dlg).value = await f.text();
      }
    } catch (err) {
      $("#g-doccount", dlg).textContent = "Could not read the file: " + err.message;
      return;
    }
    updateDocInfo();
  };

  $("#g-run", dlg).onclick = async () => {
    const topic = $("#g-topic", dlg).value.trim();
    const doc = $("#g-doc", dlg).value.trim();
    const status = $("#g-status", dlg);
    if (!topic && !doc) { status.textContent = "Enter a topic or paste a document."; return; }
    const s = store.get().settings;
    const targetDeck = store.get().decksCache[$("#g-deck", dlg).value];
    const toOneLesson = $("#g-lesson", dlg).value !== "__auto__";
    const count = +$("#g-count", dlg).value || 0;
    status.textContent = "Generating …";
    try {
      let system = await fetchPrompt("prompts/generate-deck.md", GEN_FALLBACK);
      if (doc) system += "\n\n" + await fetchPrompt("prompts/extract-deck.md", EXTRACT_FALLBACK);
      const countTxt = count ? String(count) : (doc ? `about ${suggestedCount()}` : "about 100");
      const lead = doc
        ? `Create ${countTxt} flashcards covering the most important content of the document below.\n` +
          (topic ? `Focus/angle: ${topic}\n` : "")
        : `Create ${countTxt} flashcards.\nTopic: ${topic}\n`;
      let received = 0;
      const resp = await aiMessage({
        model: s.model, max_tokens: 30000,
        system,
        messages: [{ role: "user", content:
          lead +
          `Level: ${$("#g-level", dlg).value || "unspecified"}\n` +
          (targetDeck ? `Deck context: ${targetDeck.explainContext || targetDeck.title}\n` +
            `Existing lesson titles (do not duplicate their content): ${targetDeck.lessons.map(l => l.title).join("; ")}\n` : "") +
          (toOneLesson ? "Put all cards in ONE lesson.\n" : "") +
          ($("#g-extra", dlg).value ? `Extra instructions: ${$("#g-extra", dlg).value}\n` : "") +
          (doc ? `\nDocument:\n<<<\n${doc}\n>>>` : "") }],
        output_config: { format: { type: "json_schema", schema: GEN_SCHEMA } },
      }, { onText: (t) => { received += t.length; status.textContent = `Generating … ${Math.round(received / 1000)} kB`; } });
      if (resp.stop_reason === "refusal") throw new Error("The model declined the request.");
      if (resp.stop_reason === "max_tokens") throw new Error("The reply was cut off — try fewer cards.");
      const lessons = JSON.parse(resp.content.find(b => b.type === "text").text).lessons;
      const total = lessons.reduce((n, l) => n + l.cards.length, 0);
      status.textContent = `${total} cards in ${lessons.length} lesson(s) — choose what to keep:`;
      $("#g-preview", dlg).innerHTML = lessons.map((l, li) => `
        <h3 style="margin:.7rem 0 .2rem">${esc(l.title)}</h3>
        ${l.cards.map((c, ci) => `
        <label style="display:flex;gap:.5rem;align-items:baseline;margin:.3rem 0;color:var(--fg)">
          <input type="checkbox" checked data-li="${li}" data-ci="${ci}" style="width:auto">
          <span><strong>${esc(c.front)}</strong> → ${esc(c.back)}
            ${c.example ? `<br><span class="muted small">${esc(c.example.text)}</span>` : ""}</span>
        </label>`).join("")}`).join("") +
        `<button type="button" id="g-save" class="primary" style="margin:.6rem 0">Save selected</button>`;
      typeset($("#g-preview", dlg));
      $("#g-save", dlg).onclick = () => {
        const chosen = lessons.map((l, li) => ({ ...l,
          cards: l.cards.filter((_, ci) => dlg.querySelector(`[data-li="${li}"][data-ci="${ci}"]`)?.checked),
        })).filter(l => l.cards.length);
        saveGenerated(chosen, dlg, topic);
      };
    } catch (e) { status.textContent = "Error: " + aiError(e); }
  };
}

function saveGenerated(genLessons, dlg, topic) {
  if (!genLessons.length) return;
  const deckSel = $("#g-deck", dlg).value;
  const lessonSel = $("#g-lesson", dlg).value;
  store.patch(s => {
    let deck;
    if (deckSel === "__new__") {
      const title = $("#g-newtitle", dlg).value.trim() || topic || genLessons[0].title || "From document";
      const id = "own-" + title.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "").slice(0, 30);
      deck = s.decksCache[id] || { id, title, own: true, settings: { tts: false }, lessons: [] };
      s.decksCache[id] = deck;
    } else {
      deck = s.decksCache[deckSel];
      deck.own = true; // redigert lokalt → synkes
    }
    const cardIds = new Set(deck.lessons.flatMap(l => l.cards.map(c => c.id)));
    const lessonIds = new Set(deck.lessons.map(l => l.id));
    const cleanCards = (cards) => cards.map(c => {
      let id = c.id, n = 1;
      while (cardIds.has(id)) id = `${c.id}-${n++}`;
      cardIds.add(id);
      const card = { id, front: c.front, back: c.back };
      if (c.hint) card.hint = c.hint;
      if (c.example) card.example = c.example;
      if (c.tts) card.tts = c.tts;
      if (c.reverse) card.reverse = true;
      return card;
    });
    if (lessonSel !== "__auto__" && deck.lessons.length) {
      // alt inn i valgt eksisterende leksjon
      const target = deck.lessons.find(l => l.id === lessonSel) || deck.lessons.at(-1);
      target.cards.push(...cleanCards(genLessons.flatMap(l => l.cards)));
    } else {
      for (const gl of genLessons) {
        let lid = gl.id, n = 1;
        while (lessonIds.has(lid)) lid = `${gl.id}-${n++}`;
        lessonIds.add(lid);
        const lesson = { id: lid, title: gl.title, cards: cleanCards(gl.cards) };
        if (gl.note) lesson.note = gl.note;
        if (gl.intro) lesson.intro = gl.intro;
        deck.lessons.push(lesson);
      }
    }
  });
  dlg.close();
  render();
  // lagre eksternt med en gang hvis GitHub-synk er satt opp
  if (activeStore()) syncNow(null, true);
}

/* --- omskriv leech --- */
function rewriteDialog(deck, key) {
  const cardId = key.split("/")[1];
  const found = findCard(deck, cardId);
  if (!found) return;
  const dlg = openDialog(`<div style="padding:1.2rem">
    <h2 style="margin-top:0">✨ Rewrite suggestions</h2>
    <p class="muted small">This card fails often — usually the card is the problem, not your memory.</p>
    <div class="ai-out" id="rw-out"></div>
    <div style="display:flex;justify-content:flex-end;margin-top:.8rem">
      <button onclick="this.closest('dialog').close()">Close</button></div></div>`);
  const out = $("#rw-out", dlg);
  const s = store.get().settings;
  aiMessage({
    model: s.model, max_tokens: 800,
    system: "The following flashcard keeps being failed (a 'leech'). Diagnose why (too broad? ambiguous? missing context?) and propose 1-3 rewritten versions, possibly splitting it into multiple atomic cards. Answer briefly in the card's language context.",
    messages: [{ role: "user", content:
      `Context: ${deck.explainContext || deck.title}\nFront: ${typeof found.card.front === "object" ? found.card.front.html : found.card.front}\nBack: ${typeof found.card.back === "object" ? found.card.back.html : found.card.back}` }],
  }, { onText: (t) => { out.textContent += t; } })
    .then(() => typeset(out))
    .catch(e => { out.textContent += "\n[Error: " + aiError(e) + "]"; });
}

/* ========== router & tastatur ========== */
function currentView() { return (location.hash || "#home").slice(1).split("/")[0]; }
function render() {
  const v = currentView();
  document.querySelectorAll("[data-nav]").forEach(a => a.classList.toggle("active", a.dataset.nav === v));
  ({ home: viewHome, session: viewSession, browse: viewBrowse,
     explore: viewExplore, stats: viewStats, settings: viewSettings }[v] || viewHome)();
  if (v === "session" && session && !session.flipped) session.shownAt = Date.now();
}
window.addEventListener("hashchange", render);
document.addEventListener("keydown", (e) => {
  if (currentView() !== "session" || !session) return;
  if (e.target instanceof Element && e.target.matches("input,textarea,select")) return;
  const flipKeys = [" ", "ArrowRight", "ArrowLeft"];
  if (flipKeys.includes(e.key)) e.preventDefault();
  if (!session.flipped) {
    // forsiden: space og begge piler snur — så →→ = OK og →← = ikke OK
    if (flipKeys.includes(e.key)) flipCard();
    else if (e.key === "z") undoLast();
    return;
  }
  // baksiden: space/→ = OK, ← = ikke OK. Kort sperre etter snuing mot dobbelttrykk.
  const guarded = Date.now() < (session.flipGuardUntil || 0);
  if ((e.key === " " || e.key === "ArrowRight") && !guarded) gradeCard("ok");
  else if (e.key === "ArrowLeft" && !guarded) gradeCard("fail");
  else if (e.key === "3") gradeCard("ok");
  else if (e.key === "1") gradeCard("fail");
  else if (e.key === "0" || e.key === "x") gradeCard("never");
  else if (e.key === "z") undoLast();
});

await handleOAuthCallback();
await loadBuiltins();
await handleShareHash();
render();
